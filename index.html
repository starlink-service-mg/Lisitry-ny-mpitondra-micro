<!DOCTYPE html>
<html lang="mg" translate="no">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="google" content="notranslate" />
    <meta name="description" content="Fidirana — Fitantanana ny fiangonana (Connexion — Gestion communautaire)" />
    <title>Fidirana — Fitantanana</title>

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="apple-touch-icon" href="./icon.png" />
    <link rel="icon" type="image/png" href="./icon.png" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Supabase JS -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-page">
        <!-- ====== LOGIN SECTION ====== -->
        <div class="login-container" id="login-section">
            <div class="login-logo">
                <div class="logo-icon">
                    <i data-lucide="mic"></i>
                </div>
                <h1>Tongasoa 👋</h1>
                <p>Midira amin'ny kaontinao (Connectez-vous à votre compte)</p>
            </div>

            <!-- Error / Success Messages -->
            <div class="form-error" id="form-error"></div>
            <div class="form-success" id="form-success"></div>

            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="login-email">Mailaka (Email)</label>
                    <div class="input-icon-wrapper">
                        <i data-lucide="mail"></i>
                        <input type="email" id="login-email" placeholder="votre@email.com" required autocomplete="email" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="login-password">Tenimiafina (Mot de passe)</label>
                    <div class="input-icon-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="login-btn">
                    <i data-lucide="log-in"></i> Hiditra (Se connecter)
                </button>

                <!-- PWA Install Button (Now inside login section) -->
                <button type="button" id="btn-install-pwa" class="btn btn-secondary" style="margin-top: 12px; width: 100%; border: 2px dashed var(--color-primary); color: var(--color-primary); font-weight: bold; background: var(--color-primary-light);">
                    <i data-lucide="download"></i> Installer l'application mobile
                </button>
            </form>

            <div class="login-footer">
                Tsy manana kaonty ve? (Pas de compte?)
                <a href="#" onclick="showSignup(); return false;">Hisoratra anarana (S'inscrire)</a>
            </div>
        </div>

        <!-- ====== SIGNUP SECTION ====== -->
        <div class="login-container hidden" id="signup-section">
            <div class="login-logo">
                <div class="logo-icon">
                    <i data-lucide="user-plus"></i>
                </div>
                <h1>Fisoratana anarana ✨</h1>
                <p>Mamorona kaonty vaovao (Créez un nouveau compte)</p>
            </div>

            <!-- Error / Success Messages (reuse same IDs) -->
            <div class="form-error" id="form-error-signup"></div>
            <div class="form-success" id="form-success-signup"></div>

            <form id="signup-form" autocomplete="off">
                <div class="form-group">
                    <label for="signup-name">Anarana feno (Nom complet)</label>
                    <div class="input-icon-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="signup-name" placeholder="Rakoto Jean" required autocomplete="name" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-email">Mailaka (Email)</label>
                    <div class="input-icon-wrapper">
                        <i data-lucide="mail"></i>
                        <input type="email" id="signup-email" placeholder="votre@email.com" required autocomplete="email" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-password">Tenimiafina (Mot de passe)</label>
                    <div class="input-icon-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="signup-password" placeholder="6 litera farafahakeliny" required autocomplete="new-password" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-confirm">Avereno ny tenimiafina (Confirmer)</label>
                    <div class="input-icon-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="signup-confirm" placeholder="Avereno eto" required autocomplete="new-password" />
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="signup-btn">
                    <i data-lucide="user-plus"></i> Hisoratra anarana (S'inscrire)
                </button>
            </form>

            <div class="login-footer">
                Efa manana kaonty? (Déjà un compte?)
                <a href="#" onclick="showLogin(); return false;">Hiditra (Se connecter)</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Init Service Worker pour PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }

        // Logic for "Install App" Button
        let deferredPrompt = null;
        const installBtn = document.getElementById('btn-install-pwa');

        // Capture the install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the mini-infobar from appearing on mobile naturally if we want our custom button
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
        });

        // Trigger the install prompt when button is clicked
        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    // Show the install prompt
                    deferredPrompt.prompt();
                    // Wait for the user to respond to the prompt
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log(`User response to install: ${outcome}`);
                    // We've used the prompt, and can't use it again, discard it
                    deferredPrompt = null;
                } else {
                    alert("⚠️ L'installation ne peut se faire que si tu visites le site avec une véritable adresse internet (ex: ton-site.com ou localhost), ou si l'appli est déjà installée !");
                }
            });
        }

        // Catch successful installation
        window.addEventListener('appinstalled', () => {
            console.log('PWA was successfully installed');
        });

        // Initialize icons
        lucide.createIcons();
        // Initialize auth page
        initAuthPage();
    </script>
</body>
</html>
